app = "trek-hanoi"
primary_region = "nrt"

[build]
  image = "mauriceboe/trek:latest"

[[mounts]]
  source = "trek_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/api/health"
    interval = "30s"
    timeout = "10s"
    method = "GET"
